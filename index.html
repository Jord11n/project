<!DOCTYPE html>
<html>
<head>
    <title>Sweeper</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --accent: #ff4d4d;
            --cell-size: 25px;
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: 'Courier New', Courier, monospace; overflow: hidden; }

        /* Intro Screen */
        #intro-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: black; display: flex; align-items: center; justify-content: center;
            z-index: 100; transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
            cursor: pointer;
        }
        #intro-screen h1 { font-size: 3rem; text-shadow: 0 0 10px var(--accent); letter-spacing: 5px; text-align: center; }

        /* Go! Flash Overlay */
        #go-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 8rem; font-weight: 900; color: var(--accent);
            opacity: 0; pointer-events: none; z-index: 50;
            text-shadow: 0 0 30px var(--accent);
        }

        /* Main Game Layout */
        #game-container {
            display: flex; height: 100vh; align-items: center; justify-content: center; gap: 40px;
            background: radial-gradient(circle, #2a2a2a 0%, #1a1a1a 100%);
            opacity: 0; transition: opacity 0.5s;
        }

        /* The Grid - Hard Mode (16x16) */
        #grid { 
            display: grid; 
            grid-template-columns: repeat(16, var(--cell-size)); 
            gap: 2px; border: 4px solid #444; padding: 5px; background: #000;
        }
        .cell {
            width: var(--cell-size); height: var(--cell-size);
            background: #333; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: bold; cursor: crosshair; transition: 0.1s;
            box-sizing: border-box;
        }
        .cell:hover { background: #444; }
        .cell.revealed { background: #ddd; color: #000; cursor: default; }
        
        /* Shaking Bomb Animation */
        .cell.mine { 
            background: var(--accent) !important; 
            color: white; 
            animation: shake 0.2s infinite; 
        }
        
        .cell.flagged { color: var(--accent); }

        /* Progress Bar */
        #progress-wrapper {
            width: 30px; height: 400px; background: #333; border: 2px solid #555;
            position: relative; display: flex; flex-direction: column-reverse;
        }
        #progress-fill { width: 100%; height: 0%; background: var(--accent); transition: height 0.3s ease; box-shadow: 0 0 15px var(--accent); }
        .bar-label { position: absolute; top: -30px; left: -10px; font-size: 12px; white-space: nowrap; }

        /* Animations */
        @keyframes flash {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.5); }
        }
        @keyframes shake { 
            0% {transform: translate(1px, 1px);} 
            25% {transform: translate(-1px, -1px);} 
            50% {transform: translate(1px, -1px);} 
            75% {transform: translate(-1px, 1px);} 
            100% {transform: translate(1px, 1px);} 
        }
    </style>
</head>
<body>

    <div id="intro-screen" onclick="startGame()">
        <h1>READY?</h1>
    </div>

    <div id="go-overlay">GO!</div>

    <div id="game-container">
        <div>
            <h2 id="status">TAKE YOUR TIME..</h2>
            <div id="grid"></div>
            <button onclick="location.reload()" style="margin-top: 20px; background: none; color: white; border: 1px solid white; padding: 10px; cursor: pointer; font-family: inherit;">REBOOT SYSTEM</button>
        </div>

        <div id="progress-wrapper">
            <div class="bar-label">CLEARANCE</div>
            <div id="progress-fill"></div>
        </div>
    </div>

    <script>
        const size = 16; 
        const mineCount = 40; 
        const gridElement = document.getElementById('grid');
        const progressFill = document.getElementById('progress-fill');
        const statusElement = document.getElementById('status');
        const goOverlay = document.getElementById('go-overlay');
        const gameContainer = document.getElementById('game-container');
        const introScreen = document.getElementById('intro-screen');

        let board = [];
        let gameOver = false;
        let revealedCount = 0;
        const totalSafeCells = (size * size) - mineCount;

        function startGame() {
            introScreen.style.transform = 'translateY(-100%)';
            // this starts the Go! animation and shows the game after the slide finishes this part was a bit annoying for me personally
            introScreen.addEventListener('transitionend', () => {
                gameContainer.style.opacity = '1';
                goOverlay.style.animation = 'flash 0.6s forwards';
            }, { once: true });
        }

        function init() {
            for (let r = 0; r < size; r++) {
                board[r] = [];
                for (let c = 0; c < size; c++) {
                    board[r][c] = { r, c, mine: false, revealed: false, flagged: false, count: 0 };
                }
            }
            let planted = 0;
            while (planted < mineCount) {
                let r = Math.floor(Math.random() * size), c = Math.floor(Math.random() * size);
                if (!board[r][c].mine) { board[r][c].mine = true; planted++; }
            }
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c].mine) continue;
                    let mines = 0;
                    getNeighbors(r, c).forEach(n => { if (n.mine) mines++; });
                    board[r][c].count = mines;
                }
            }
            render();
        }

        function getNeighbors(r, c) {
            const n = [];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    if (board[r + dr] && board[r + dr][c + dc]) n.push(board[r + dr][c + dc]);
                }
            }
            return n;
        }

        function render() {
            gridElement.innerHTML = '';
            board.forEach(row => row.forEach(cell => {
                const el = document.createElement('div');
                el.className = 'cell' + (cell.revealed ? ' revealed' : '');
                if (cell.revealed) {
                    if (cell.mine) { 
                        el.classList.add('mine'); 
                        el.innerText = '☢'; 
                    } else if (cell.count > 0) {
                        el.innerText = cell.count;
                    }
                } else if (cell.flagged) {
                    el.classList.add('flagged'); 
                    el.innerText = '▲';
                }
                el.onclick = () => reveal(cell.r, cell.c);
                el.oncontextmenu = (e) => { e.preventDefault(); toggleFlag(cell); };
                gridElement.appendChild(el);
            }));
            
            const progress = (revealedCount / totalSafeCells) * 100;
            progressFill.style.height = progress + '%';
        }

        function reveal(r, c) {
            if (gameOver || board[r][c].revealed || board[r][c].flagged) return;
            board[r][c].revealed = true;
            if (!board[r][c].mine) revealedCount++;

            if (board[r][c].mine) {
                gameOver = true;
                statusElement.innerText = "FAIL!";
                statusElement.style.color = "var(--accent)";
                revealAll();
            } else if (board[r][c].count === 0) {
                getNeighbors(r, c).forEach(n => reveal(n.r, n.c));
            }
            
            if (revealedCount === totalSafeCells && !gameOver) {
                statusElement.innerText = "CLEARED!";
                statusElement.style.color = "#00ff88";
                gameOver = true;
            }
            render();
        }

        function toggleFlag(cell) {
            if (!gameOver && !cell.revealed) { 
                cell.flagged = !cell.flagged; 
                render(); 
            }
        }

        function revealAll() {
            board.forEach(row => row.forEach(c => c.revealed = true));
        }

        init();
    </script>
</body>
</html>
